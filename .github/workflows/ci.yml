name: CI

# Run the test suite on every pull request (any target branch), and on pushes
# to the default branch so it stays green.
on:
  pull_request:
  push:
    branches: [main, master]

# Cancel an in-progress run if the same PR/branch gets a newer push.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # Node 20 bundles npm 10, but package-lock.json is authored by npm 11.
      # npm 10's `npm ci` reports an npm-11 lock as out-of-sync, so pin npm to
      # match the lockfile (keep this in step with the team's local npm).
      - name: Pin npm
        run: npm install -g npm@11

      # mongodb-memory-server downloads a MongoDB binary at runtime; cache it
      # across runs so the suite starts fast.
      - name: Cache MongoDB binaries
        uses: actions/cache@v4
        with:
          path: ~/.cache/mongodb-binaries
          key: ${{ runner.os }}-mongodb-binaries

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test
